name: Sync aiclient-2-api to Aliyun ACR

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --yes skopeo

      - name: Log in to Aliyun ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" |
            skopeo login \
              --username "$ACR_USERNAME" \
              --password-stdin registry.cn-shanghai.aliyuncs.com

      - name: Copy all image architectures
        run: |
          skopeo copy --all \
            docker://docker.io/justlikemaki/aiclient-2-api:latest \
            docker://registry.cn-shanghai.aliyuncs.com/rayless/aiclient-2-api:latest
