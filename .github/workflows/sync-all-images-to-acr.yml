name: Sync all images to Aliyun ACR

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  sync:
    name: Sync ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - source: docker.io/justlikemaki/aiclient-2-api:latest
            target: aiclient-2-api:latest
            copy_args: --all
          - source: ghcr.io/homarr-labs/homarr:latest
            target: homarr:latest
            copy_args: --all
          - source: docker.io/weishaw/sub2api:latest
            target: sub2api:latest
            copy_args: --all
          - source: docker.io/vaultwarden/server:latest
            target: vaultwarden:latest
            copy_args: --all
          - source: ghcr.io/home-assistant/home-assistant:stable
            target: home-assistant:stable
            copy_args: --override-os linux --override-arch amd64 --format v2s2
          - source: docker.io/guovern/iptv-api:latest
            target: iptv-api:latest
            copy_args: --all
          - source: docker.io/gdy666/lucky:latest
            target: lucky:latest
            copy_args: --all
          - source: docker.io/metacubex/mihomo:latest
            target: mihomo:latest
            copy_args: --all
          - source: docker.io/openlistteam/openlist:latest-aio
            target: openlist:latest-aio
            copy_args: --all
          - source: lscr.io/linuxserver/qbittorrent:latest
            target: qbittorrent:latest
            copy_args: --all
          - source: docker.io/rustdesk/rustdesk-server:latest
            target: rustdesk-server:latest
            copy_args: --all
          - source: docker.io/library/postgres:18-alpine
            target: postgres:18-alpine
            copy_args: --all
          - source: docker.io/library/redis:8-alpine
            target: redis:8-alpine
            copy_args: --all

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --yes skopeo

      - name: Log in to Aliyun ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" |
            skopeo login \
              --username "$ACR_USERNAME" \
              --password-stdin registry.cn-shanghai.aliyuncs.com

      - name: Copy all image architectures
        run: |
          skopeo copy ${{ matrix.copy_args }} \
            "docker://${{ matrix.source }}" \
            "docker://registry.cn-shanghai.aliyuncs.com/rayless/${{ matrix.target }}"
