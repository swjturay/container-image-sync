name: Sync all images to Aliyun ACR

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --yes skopeo

      - name: Log in to Aliyun ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" |
            skopeo login \
              --username "$ACR_USERNAME" \
              --password-stdin registry.cn-shanghai.aliyuncs.com
          echo "$ACR_PASSWORD" |
            docker login \
              --username "$ACR_USERNAME" \
              --password-stdin registry.cn-shanghai.aliyuncs.com

      - name: Sync linux/amd64 images in parallel
        env:
          SYNC_PARALLELISM: "4"
        shell: bash
        run: |
          set -euo pipefail

          images_file="$(mktemp)"
          cat > "$images_file" <<'IMAGES'
          docker.io/justlikemaki/aiclient-2-api:latest aiclient-2-api:latest
          ghcr.io/homarr-labs/homarr:latest homarr:latest
          docker.io/weishaw/sub2api:latest sub2api:latest
          docker.io/vaultwarden/server:latest vaultwarden:latest
          docker.io/guovern/iptv-api:latest iptv-api:latest
          docker.io/gdy666/lucky:latest lucky:latest
          docker.io/metacubex/mihomo:latest mihomo:latest
          docker.io/openlistteam/openlist:latest-aio openlist:latest-aio
          lscr.io/linuxserver/qbittorrent:latest qbittorrent:latest
          docker.io/rustdesk/rustdesk-server:latest rustdesk-server:latest
          docker.io/library/postgres:18-alpine postgres:18-alpine
          docker.io/library/redis:8-alpine redis:8-alpine
          docker.io/nousresearch/hermes-agent:latest hermes-agent:latest
          docker.io/moelin/1panel:v2 1panel:v2
          IMAGES

          sync_one() {
            local source="$1"
            local target="$2"
            local attempt

            echo "::group::Sync ${source} -> ${target}"
            for attempt in 1 2 3; do
              echo "Attempt ${attempt}/3 for ${source}"
              if skopeo copy \
                --override-os linux \
                --override-arch amd64 \
                --format v2s2 \
                "docker://${source}" \
                "docker://registry.cn-shanghai.aliyuncs.com/rayless/${target}"; then
                echo "Synced ${source} -> ${target}"
                echo "::endgroup::"
                return 0
              fi
              sleep $((attempt * 20))
            done
            echo "Failed to sync ${source} -> ${target}"
            echo "::endgroup::"
            return 1
          }

          export -f sync_one

          if ! xargs -a "$images_file" -n 2 -P "$SYNC_PARALLELISM" bash -c 'sync_one "$1" "$2"' _; then
            echo "One or more image sync tasks failed." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Parallel skopeo image sync completed with parallelism=${SYNC_PARALLELISM}." >> "$GITHUB_STEP_SUMMARY"

      - name: Sync Home Assistant with Docker compatibility path
        run: |
          docker pull --platform linux/amd64 ghcr.io/home-assistant/home-assistant:stable
          docker tag \
            ghcr.io/home-assistant/home-assistant:stable \
            registry.cn-shanghai.aliyuncs.com/rayless/home-assistant:stable
          docker push registry.cn-shanghai.aliyuncs.com/rayless/home-assistant:stable
          echo "Home Assistant synced with Docker compatibility path." >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        run: echo "All images synced successfully." >> "$GITHUB_STEP_SUMMARY"
