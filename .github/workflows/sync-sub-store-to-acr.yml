name: Sync Sub-Store image to Aliyun ACR

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-sub-store:
    runs-on: ubuntu-latest

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --yes skopeo

      - name: Log in to Aliyun ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          echo "$ACR_PASSWORD" |
            skopeo login \
              --username "$ACR_USERNAME" \
              --password-stdin registry.cn-shanghai.aliyuncs.com

      - name: Sync xream/sub-store:latest linux/amd64
        run: |
          skopeo copy \
            --override-os linux \
            --override-arch amd64 \
            --format v2s2 \
            docker://docker.io/xream/sub-store:latest \
            docker://registry.cn-shanghai.aliyuncs.com/rayless/sub-store:latest
          echo "Synced docker.io/xream/sub-store:latest to registry.cn-shanghai.aliyuncs.com/rayless/sub-store:latest" >> "$GITHUB_STEP_SUMMARY"
