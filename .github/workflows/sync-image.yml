name: Sync container image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install --yes skopeo

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GHCR_TOKEN" | skopeo login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Copy all image architectures
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner_lowercase="${OWNER,,}"
          skopeo copy --all \
            docker://docker.io/dqzboy/registry:latest \
            "docker://ghcr.io/${owner_lowercase}/registry:latest"
